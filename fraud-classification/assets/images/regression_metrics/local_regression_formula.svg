<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180">
  <rect width="1200" height="180" rx="18" ry="18" fill="#F8FBFE" stroke="#D6E4F0" stroke-width="2"/>
  <text x="600" y="102" text-anchor="middle" font-family="Times New Roman, serif" font-size="42" fill="#111827">f_hat(x_0) = argmin_{beta_0,beta_1} SUM_{i=1}^{n} K_lambda(x_i, x_0) [y_i - beta_0 - beta_1(x_i-x_0)]^2</text>
